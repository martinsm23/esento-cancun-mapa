<!doctype html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<meta name="theme-color" content="#1B2A3E">
<title>Esento Cancún — Oferta Vertical V2</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;line-height:1.4;overflow:hidden;overscroll-behavior:none}
:root[data-theme="dark"]{--bg:#0d1421;--card:#1a2538;--card-2:#22304a;--border:#2c3e50;--muted:#8896aa;--text:#fff;--text-soft:#cdd6e0;--navy:#1B2A3E;--gold:#C9A876;--ok:#2ecc71;--warn:#f39c12;--err:#e74c3c;--vp:#1abc9c;--vr:#e67e22;--vb:#9b59b6;--edited:#f1c40f;--top10:#ffd700;--shadow:0 4px 16px rgba(0,0,0,.5)}
:root[data-theme="light"]{--bg:#f5f7fa;--card:#fff;--card-2:#ecf0f3;--border:#d5dee5;--muted:#7a8794;--text:#1B2A3E;--text-soft:#4a5764;--navy:#1B2A3E;--gold:#C9A876;--ok:#27ae60;--warn:#e67e22;--err:#c0392b;--vp:#1abc9c;--vr:#e67e22;--vb:#9b59b6;--edited:#f39c12;--top10:#daa520;--shadow:0 2px 12px rgba(0,0,0,.12)}
body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100dvh}
header{background:var(--navy);color:#fff;padding:6px 10px env(safe-area-inset-top) 10px;flex-shrink:0;position:relative;z-index:1000;border-bottom:1px solid #000}
.title{font-size:12px;font-weight:600;letter-spacing:.4px;color:var(--gold);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.title-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.title small{font-weight:400;color:#aaa;font-size:10px}
.title-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:none;color:var(--gold);font-size:18px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:6px}
.icon-btn:hover{background:rgba(255,255,255,.1)}
.kpis{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:1px}
.kpis::-webkit-scrollbar{display:none}
.kpi{flex:0 0 auto;background:#22304a;border:1px solid #344056;border-radius:9px;padding:5px 8px;min-width:65px;text-align:center}
.kpi .v{font-size:14px;font-weight:700;color:#fff;line-height:1.1}
.kpi .l{font-size:9px;color:#aab;margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.kpi.vp .v{color:var(--vp)}.kpi.vr .v{color:var(--vr)}.kpi.warn .v{color:var(--warn)}.kpi.ok .v{color:var(--ok)}.kpi.gold .v{color:var(--gold)}
.controls{display:flex;gap:5px;padding:6px 10px;background:var(--navy);border-bottom:1px solid #000;align-items:center;flex-shrink:0}
.search-input{flex:1;background:#1a2538;border:1px solid #2c3e50;border-radius:7px;padding:7px 9px;color:#fff;font-size:13px;outline:none;min-width:0}
.search-input::placeholder{color:#7a8794}
.filters{display:flex;gap:5px;padding:0 10px 6px;background:var(--navy);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.filters::-webkit-scrollbar{display:none}
.pill{flex:0 0 auto;background:#22304a;border:1px solid #344056;color:#9aa5b8;padding:5px 11px;border-radius:13px;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s;font-weight:500}
.pill.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.pill.top10{background:var(--top10);border-color:var(--top10);color:#000;font-weight:700}
.pill.top10:not(.active){background:#22304a;border-color:var(--top10);color:var(--top10)}
.main{flex:1;position:relative;min-height:0}
#map{position:absolute;inset:0;z-index:1}
.fab{position:absolute;width:46px;height:46px;background:var(--gold);color:#000;border:none;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);cursor:pointer;z-index:1000}
.fab.txt{font-size:13px;font-weight:700;width:auto;height:auto;padding:10px 14px;border-radius:24px}
#fab-loc{bottom:16px;right:12px}
#fab-list{bottom:74px;right:12px;background:var(--card);color:var(--gold);font-weight:700;font-size:13px;width:auto;height:auto;padding:9px 14px;border-radius:24px;border:1px solid var(--border)}
#fab-export{bottom:130px;right:12px;background:var(--card);color:var(--gold);font-weight:700;font-size:13px;width:auto;height:auto;padding:9px 14px;border-radius:24px;border:1px solid var(--border)}

/* DRAWER (List) */
.drawer{position:fixed;top:0;bottom:0;left:0;width:min(420px,100%);background:var(--bg);box-shadow:4px 0 24px rgba(0,0,0,.5);z-index:2500;transform:translateX(-100%);transition:transform .25s;display:flex;flex-direction:column}
.drawer.show{transform:translateX(0)}
.drawer-header{padding:10px 12px env(safe-area-inset-top) 12px;background:var(--navy);color:#fff;border-bottom:1px solid #000;display:flex;align-items:center;gap:8px;flex-shrink:0}
.drawer-header .lbl{flex:1;font-weight:600;font-size:14px;color:var(--gold)}
.drawer-search{flex-shrink:0;padding:8px 12px;background:var(--navy);border-bottom:1px solid #000}
.drawer-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px}
.lc{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:7px;display:flex;gap:9px;margin-bottom:6px;cursor:pointer}
.lc.top10{border-color:var(--top10);box-shadow:0 0 0 1px var(--top10)}
.lc.visited{opacity:.7}
.lc-img,.lc-noimg{width:60px;height:60px;border-radius:7px;flex-shrink:0;background:var(--card-2);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:9px;text-align:center;object-fit:cover}
.lc-body{flex:1;min-width:0}
.lc-name{font-weight:600;font-size:13px;color:var(--text);margin-bottom:2px;display:flex;align-items:center;gap:5px}
.lc-name .star{color:var(--top10);font-size:11px}
.lc-sub{font-size:11px;color:var(--muted);margin-bottom:3px;line-height:1.3}
.lc-tags{display:flex;gap:3px;flex-wrap:wrap}

.tag{font-size:9px;padding:2px 6px;border-radius:5px;color:#fff;font-weight:500;line-height:1.2}
.tag.t-vp{background:var(--vp)}.tag.t-vr{background:var(--vr)}.tag.t-both{background:var(--vb)}.tag.t-other{background:var(--muted)}
.tag.s-Lujo{background:#8e44ad}.tag.s-Premium{background:#3498db}.tag.s-Ultra-lujo{background:#c0392b}
.tag.q-Validada{background:var(--ok);color:#000}.tag.q-Estimada{background:var(--warn);color:#000}.tag.q-No{background:var(--err)}
.tag.visited{background:#16a085;color:#fff}
.tag.top10{background:var(--top10);color:#000;font-weight:700}
.tag.edited{background:var(--edited);color:#000;font-weight:700}

/* SHEET */
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-top-left-radius:18px;border-top-right-radius:18px;box-shadow:0 -8px 32px rgba(0,0,0,.6);z-index:3000;transform:translateY(100%);transition:transform .25s;max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
.sheet.show{transform:translateY(0)}
.sheet-bar{background:var(--navy);color:#fff;padding:11px 14px env(safe-area-inset-top) 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.4);position:relative;z-index:5}
.sheet-back{background:rgba(255,255,255,.1);color:#fff;border:none;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;flex-shrink:0}
.sheet-back:active{background:rgba(255,255,255,.2)}
.sheet-bar .name{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--gold)}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding-bottom:env(safe-area-inset-bottom)}
.sheet-img{width:100%;height:160px;object-fit:cover;background:var(--card-2);flex-shrink:0;display:block}
.sheet-noimg{width:100%;height:120px;background:var(--card-2);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;flex-shrink:0}
.sb-content{padding:12px 14px}
.sheet-title{font-size:18px;font-weight:700;margin-bottom:3px;line-height:1.2;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sheet-title .star-top10{color:var(--top10);font-size:18px}
.sheet-sub{color:var(--muted);font-size:12px;margin-bottom:9px}
.sheet-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.priceblock{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:9px;margin-bottom:12px;display:flex;justify-content:space-around;text-align:center;gap:6px}
.priceblock .pv{font-size:14px;font-weight:700;color:var(--gold);line-height:1.1}
.priceblock .pv.edited{color:var(--edited)}
.priceblock .pl{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.3px;text-transform:uppercase}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.meta-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 8px}
.meta-row .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px}
.meta-row .v{font-size:12px;color:var(--text);word-break:break-word;line-height:1.3}
.meta-row .v.edited{color:var(--edited)}
.amenities{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.amen{background:var(--card);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:13px;font-size:10px}
h4.section{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 7px;font-weight:600;display:flex;align-items:center;gap:5px}
.payment{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px;font-size:12px;line-height:1.5}
.payment dt{display:inline;color:var(--muted);font-size:10px}
.payment dd{display:inline;color:var(--text);margin-left:3px;font-weight:600}
.payment dd::after{content:"\A";white-space:pre}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:6px 0}
.act{display:flex;align-items:center;justify-content:center;gap:5px;background:var(--gold);color:#000;text-decoration:none;font-weight:600;padding:10px;border-radius:9px;font-size:12px;border:none;cursor:pointer}
.act.alt{background:var(--card);color:var(--text);border:1px solid var(--border)}
.act.green{background:#25d366;color:#fff}
.act.full{grid-column:1/-1}
.act.ok{background:var(--ok);color:#fff}
.act.warn{background:var(--warn);color:#000}
.notes-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px;margin-bottom:9px}
.notes-card textarea{width:100%;background:var(--card-2);border:1px solid var(--border);border-radius:7px;padding:7px;color:var(--text);font-size:12px;resize:vertical;min-height:60px;font-family:inherit}
.notes-card label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text);padding:4px 0;cursor:pointer}
.notes-card label input[type=checkbox]{width:18px;height:18px;cursor:pointer}
.notes-checks{display:grid;grid-template-columns:1fr;gap:1px;margin:6px 0;padding:6px;background:var(--card-2);border-radius:7px}
.notes-meta{font-size:10px;color:var(--muted);margin-top:6px}
.fld-edit{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.fld-edit label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.fld-edit input,.fld-edit select,.fld-edit textarea{background:var(--card-2);border:1px solid var(--border);color:var(--text);padding:7px;border-radius:7px;font-size:13px;font-family:inherit}
.section-edit{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px;margin-bottom:9px}
.section-edit > .section-title{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-weight:600}
.fuente{color:var(--muted);font-size:10px;margin-top:8px;line-height:1.4}
.fuente a{color:var(--gold)}
.user-marker{background:#2196f3;border:3px solid #fff;border-radius:50%;width:18px;height:18px;box-shadow:0 0 0 4px rgba(33,150,243,.3)}
.leaflet-popup-content-wrapper{background:var(--card);color:var(--text);border-radius:8px;border:1px solid var(--border)}
.leaflet-popup-tip{background:var(--card)}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:4000;display:none;align-items:flex-end;justify-content:center;padding:0}
.modal.show{display:flex}
.modal-card{background:var(--bg);width:100%;max-width:600px;max-height:92vh;display:flex;flex-direction:column;border-top-left-radius:16px;border-top-right-radius:16px;overflow:hidden}
.modal-bar{background:var(--navy);color:#fff;padding:11px 14px env(safe-area-inset-top) 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.modal-bar .lbl{flex:1;font-weight:600;color:var(--gold);font-size:14px}
.modal-body{padding:12px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.q-cat{margin-bottom:14px}
.q-cat-title{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;font-weight:600;padding-bottom:3px;border-bottom:1px solid var(--border)}
.q-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:6px}
.q-text{font-size:12px;color:var(--text);margin-bottom:6px}
.q-status-row{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.q-status{flex:0 0 auto;font-size:10px;padding:3px 8px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--card-2);color:var(--muted)}
.q-status.active{background:var(--ok);color:#fff;border-color:var(--ok)}
.q-status.pending.active{background:var(--warn);color:#000;border-color:var(--warn)}
.q-status.followup.active{background:var(--err);color:#fff;border-color:var(--err)}
.q-row textarea{width:100%;background:var(--card-2);border:1px solid var(--border);color:var(--text);padding:6px;border-radius:6px;font-size:11px;resize:vertical;min-height:40px;font-family:inherit}
.proj-pick{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:10px}
.proj-pick select{width:100%;background:var(--card-2);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:7px;font-size:13px}

.method-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px;font-size:12px;line-height:1.5;color:var(--text-soft)}
.method-card h5{color:var(--gold);text-transform:uppercase;letter-spacing:.4px;font-size:11px;margin-bottom:7px}
.method-card table{width:100%;border-collapse:collapse;margin-top:8px}
.method-card th,.method-card td{padding:5px 6px;text-align:left;border-bottom:1px solid var(--border);font-size:11px}
.method-card th{color:var(--gold);font-weight:600}

.export-opts{display:grid;grid-template-columns:1fr;gap:8px}
.export-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px}
.export-card h5{color:var(--gold);font-size:12px;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.export-card p{color:var(--muted);font-size:11px;margin-bottom:8px;line-height:1.4}
.kv-mini{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px dashed var(--border)}
.kv-mini:last-child{border-bottom:none}
.kv-mini .k{color:var(--muted)}.kv-mini .v{color:var(--text);font-weight:600}

@media (max-height: 600px){
  .kpi .v{font-size:12px}.sheet-img{height:130px}
}
@media (min-width: 720px){
  .meta{grid-template-columns:repeat(3,1fr)}
  .actions{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<header>
  <div class="title">
    <div class="title-text">🏙️ Esento Cancún <small>· Oferta Vertical V2</small></div>
    <div class="title-actions">
      <button class="icon-btn" id="btn-method" title="Metodología Top 10">📋</button>
      <button class="icon-btn" id="btn-mystery" title="Mystery Shopper">🕵️</button>
      <button class="icon-btn" id="btn-settings" title="Configuración">⚙️</button>
      <button class="icon-btn" id="btn-theme" title="Cambiar tema">🌙</button>
    </div>
  </div>
  <div class="kpis" id="kpis"></div>
</header>
<div class="controls">
  <input type="search" class="search-input" id="search" placeholder="🔍 Buscar proyecto, desarrollador, zona..." autocomplete="off">
</div>
<div class="filters" id="filters">
  <button class="pill active" data-f="all">Todos</button>
  <button class="pill" data-f="venta">Venta primaria</button>
  <button class="pill" data-f="reventa">Reventa</button>
  <button class="pill top10" data-f="top10">⭐ Top 10</button>
  <button class="pill" data-f="visited">Visitados</button>
  <button class="pill" data-f="pending">Pendientes</button>
  <button class="pill" data-f="ultra">Ultra-lujo</button>
  <button class="pill" data-f="lujo">Lujo</button>
  <button class="pill" data-f="premium">Premium</button>
  <button class="pill" data-f="validada">Validadas</button>
  <button class="pill" data-f="con-notas">Con notas</button>
  <button class="pill" data-f="con-imagen">Con imagen</button>
</div>
<div class="main">
  <div id="map"></div>
  <button class="fab" id="fab-loc" title="Mi ubicación">📍</button>
  <button class="fab" id="fab-list" title="Lista">☰ Lista</button>
  <button class="fab" id="fab-export" title="Exportar">📤</button>
</div>

<!-- DRAWER LIST -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <button class="sheet-back" id="drawer-close">← Mapa</button>
    <div class="lbl" id="drawer-count">Lista</div>
  </div>
  <div class="drawer-search">
    <input class="search-input" id="drawer-search" placeholder="🔍 Filtrar lista...">
  </div>
  <div class="drawer-list" id="drawer-list"></div>
</div>

<!-- SHEET PROJECT -->
<div class="sheet" id="sheet">
  <div class="sheet-bar">
    <button class="sheet-back" id="sheet-back">← Volver al mapa</button>
    <div class="name" id="sheet-name"></div>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<!-- MODAL: Mystery / Methodology / Settings / Export -->
<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-bar">
      <button class="sheet-back" id="modal-close">← Cerrar</button>
      <div class="lbl" id="modal-title"></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    html = '<div style="width:18px;height:18px;background:' + color + ';border:3px solid #16a085;border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.5);position:relative"><div style="position:absolute;top:-5px;right:-5px;width:11px;height:11px;background:#16a085;border:1px solid #fff;border-radius:50%;font-size:8px;color:#fff;display:flex;align-items:center;justify-content:center;line-height:1">✓</div></div>';
  } else {
    html = '<div style="width:18px;height:18px;background:' + color + ';border:2px solid #fff;border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.5)"></div>';
  }
  return L.divIcon({ html: html, iconSize: [size,size], className:'', iconAnchor:[size/2,size/2] });
}

function refreshMarker(p) {
  const m = markers.find(x => x._project.id === p.id);
  if (m) m.setIcon(createIcon(p));
}

function visibleProjects() {
  const q = (state.search || '').toLowerCase().trim();
  return PROJECTS.filter(p => {
    const ep = effectiveProject(p);
    let pass = true;
    switch (state.filter) {
      case 'all': break;
      case 'venta': pass = ep.tipo === 'Venta Primaria' || ep.tipo === 'Both'; break;
      case 'reventa': pass = ep.tipo === 'Reventa' || ep.tipo === 'Both'; break;
      case 'top10': pass = !!ep.is_top10; break;
      case 'visited': pass = isVisited(p); break;
      case 'pending': pass = !isVisited(p); break;
      case 'ultra': pass = (ep.segmento||'').toLowerCase().includes('ultra'); break;
      case 'lujo': pass = (ep.segmento||'').toLowerCase() === 'lujo'; break;
      case 'premium': pass = (ep.segmento||'').toLowerCase() === 'premium'; break;
      case 'validada': pass = ep.calidad === 'Validada'; break;
      case 'con-notas': pass = hasNotes(p); break;
      case 'con-imagen': pass = !!ep.image; break;
    }
    if (pass && q) {
      const hay = (ep.project + ' ' + (ep.developer||'') + ' ' + (ep.address||'') + ' ' + (ep.segmento||'') + ' ' + (ep.estatus||'') + ' ' + ep.tipo).toLowerCase();
      pass = hay.includes(q);
    }
    return pass;
  });
}

function applyFilter() {
  const visible = visibleProjects();
  cluster.clearLayers();
  markers.forEach(m => {
    if (visible.find(p => p.id === m._project.id)) cluster.addLayer(m);
  });
  if (state.filter === 'top10' && visible.length) {
    try { map.fitBounds(L.featureGroup(visible.map(p => L.marker([p.lat,p.lng]))).getBounds().pad(0.2)); } catch(e){}
  }
  updateKPIs();
  renderDrawerList();
}

function updateKPIs() {
  const visible = visibleProjects();
  const visited = visible.filter(p => isVisited(p));
  const withNotes = visible.filter(p => hasNotes(p));
  const withImage = visible.filter(p => effectiveProject(p).image);
  const withContact = visible.filter(p => { const ep = effectiveProject(p); return ep.phone || ep.whatsapp; });
  const ppm2Vals = visible.map(p => effectiveProject(p).ppm2).filter(v => v && !isNaN(v)).sort((a,b)=>a-b);
  const median = ppm2Vals.length ? ppm2Vals[Math.floor(ppm2Vals.length/2)] : null;
  const priceVals = visible.map(p => effectiveProject(p).price_avg).filter(v => v && !isNaN(v)).sort((a,b)=>a-b);
  const priceMin = priceVals[0], priceMax = priceVals[priceVals.length-1];
  const ventaPrim = visible.filter(p => { const t = effectiveProject(p).tipo; return t==='Venta Primaria' || t==='Both'; }).length;
  const reventa = visible.filter(p => { const t = effectiveProject(p).tipo; return t==='Reventa' || t==='Both'; }).length;
  let mAns = 0, mTot = 0;
  visible.forEach(p => { const x = mysteryProgress(p); mAns += x.answered; mTot += x.total; });
  const mPct = mTot ? Math.round(100*mAns/mTot) : 0;

  const kpis = [
    { v: visible.length, l: 'Visibles', cls: '' },
    { v: ventaPrim, l: 'Venta', cls: 'vp' },
    { v: reventa, l: 'Reventa', cls: 'vr' },
    { v: visited.length+'/'+visible.length, l: 'Visitados', cls: 'ok' },
    { v: withNotes.length, l: 'Con notas', cls: 'gold' },
    { v: median ? '$' + Math.round(median/1000) + 'k' : 'N/D', l: '$/m² med', cls: 'gold' },
    { v: priceMin && priceMax ? '$' + (priceMin/1e6).toFixed(1) + '-' + (priceMax/1e6).toFixed(0) + 'M' : 'N/D', l: 'Rango', cls: '' },
    { v: withImage.length, l: 'Con foto', cls: '' },
    { v: withContact.length, l: 'Contacto', cls: '' },
    { v: mTot ? mAns + '/' + mTot : '0', l: 'Mystery ' + mPct + '%', cls: 'warn' },
  ];
  document.getElementById('kpis').innerHTML = kpis.map(k => '<div class="kpi ' + k.cls + '"><div class="v">' + esc(k.v) + '</div><div class="l">' + esc(k.l) + '</div></div>').join('');
}

    if (p.moneda) payHTML += '<dt>Moneda:</dt><dd>' + esc(p.moneda) + '</dd>';

  const checks = notesData.checks || {};
  const checkLabels = [
    ['ub_validada', 'Ubicación validada en sitio'],

    ['caseta', 'Hay caseta o sala de ventas'],
    ['tel_visible', 'Teléfono visible'],
    ['avance_obra', 'Hay avance de obra'],
    ['senaletica', 'Hay señalética comercial'],
    ['contacto_ventas', 'Pude contactar a ventas'],

  html += '<div class="meta-row"><div class="l">Forma entrega</div><div class="v ' + (isF('delivery')?'edited':'') + '">' + esc(p.delivery||'No disponible') + '</div></div>';

function renderDrawerList() {
  const allVis = visibleProjects();
  const q = state.drawerSearch;
  const visible = q ? allVis.filter(p => {
    const ep = effectiveProject(p);
    const hay = (ep.project + ' ' + (ep.developer||'') + ' ' + (ep.address||'') + ' ' + (ep.segmento||'') + ' ' + (ep.estatus||'') + ' ' + ep.tipo).toLowerCase();
    return hay.includes(q);
  }) : allVis;
  visible.sort((a,b) => {
    const ea = effectiveProject(a), eb = effectiveProject(b);
    if (ea.is_top10 && !eb.is_top10) return -1;
    if (!ea.is_top10 && eb.is_top10) return 1;
    if (ea.is_top10 && eb.is_top10) return (ea.comparable_rank||99) - (eb.comparable_rank||99);
    return (ea.project||'').localeCompare(eb.project||'');
  });
  document.getElementById('drawer-count').textContent = 'Lista (' + visible.length + ')';
  let listHTML = '';
  const errImg = "this.outerHTML=" + String.fromCharCode(39) + "<div class=lc-noimg>Sin foto</div>" + String.fromCharCode(39);

    const p = effectiveProject(rawP);
    const tipoCls = p.tipo === 'Venta Primaria' ? 't-vp' : p.tipo === 'Reventa' ? 't-vr' : p.tipo === 'Both' ? 't-both' : 't-other';
    const qCls = (p.calidad||'').split(' ')[0];
    const price = p.price_avg ? fmtMXNm(p.price_avg) : (p.price_min ? 'desde '+fmtMXNm(p.price_min) : 'ND');
    const img = p.image ? '<img class="lc-img" src="' + esc(p.image) + '" onerror="' + errImg + '">' : '<div class="lc-noimg">Sin foto</div>';
    listHTML += '<div class="lc' + (p.is_top10?' top10':'') + (isVisited(rawP)?' visited':'') + '" data-pid="' + esc(rawP.id) + '">';
    listHTML += img;
    listHTML += '<div class="lc-body">';
    listHTML += '<div class="lc-name">' + (p.is_top10?'<span class="star">⭐'+p.comparable_rank+'</span>':'') + esc(p.project) + '</div>';
    listHTML += '<div class="lc-sub">' + price + ' · ' + esc(p.segmento||'') + ' · ' + esc(p.developer||'') + '</div>';
    listHTML += '<div class="lc-tags"><span class="tag ' + tipoCls + '">' + esc(p.tipo) + '</span><span class="tag q-' + qCls + '">' + esc(p.calidad) + '</span>' + (isVisited(rawP)?'<span class="tag visited">visit</span>':'') + (hasNotes(rawP)?'<span class="tag t-other">notes</span>':'') + '</div>';
    listHTML += '</div></div>';
  });
  document.getElementById('drawer-list').innerHTML = listHTML || '<div style="text-align:center;color:var(--muted);padding:30px">Sin coincidencias</div>';
  document.querySelectorAll('#drawer-list .lc').forEach(el => {

      const p = PROJECTS.find(x => x.id === el.dataset.pid);
      if (!p) return;

      openSheet(p);
    });
  });
}

function renderMysteryQuestions(p, ans) {

      html += '<div class="q-row" data-cat="' + esc(cat.category) + '" data-qi="' + i + '">';

      html += '<div class="q-status-row">';
      html += '<button class="q-status' + (status==='preguntada'?' active':'') + '" data-st="preguntada">Preguntada</button>';
      html += '<button class="q-status pending' + (status==='pendiente'?' active':'') + '" data-st="pendiente">Pendiente</button>';
      html += '<button class="q-status' + (status==='respondida'?' active':'') + '" data-st="respondida">Respondida</button>';
      html += '<button class="q-status followup' + (status==='seguimiento'?' active':'') + '" data-st="seguimiento">Seguimiento</button>';
      html += '</div>';

}
function wireMysteryUI(p) {
  document.querySelectorAll('#modal-body .q-row').forEach(row => {
    const cat = row.dataset.cat, qi = parseInt(row.dataset.qi);
    row.querySelectorAll('.q-status').forEach(btn => {
      btn.addEventListener('click', () => {
        row.querySelectorAll('.q-status').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        state.mysteryAnswers[p.id] = state.mysteryAnswers[p.id] || {};
        state.mysteryAnswers[p.id][cat] = state.mysteryAnswers[p.id][cat] || {};
        const cur = state.mysteryAnswers[p.id][cat][qi] || {};
        cur.status = btn.dataset.st; cur.ts = Date.now();
        state.mysteryAnswers[p.id][cat][qi] = cur;
        saveState(); updateKPIs();
      });
    });
    row.querySelector('textarea').addEventListener('blur', e => {
      state.mysteryAnswers[p.id] = state.mysteryAnswers[p.id] || {};
      state.mysteryAnswers[p.id][cat] = state.mysteryAnswers[p.id][cat] || {};

      cur.answer = e.target.value; cur.ts = Date.now();
      state.mysteryAnswers[p.id][cat][qi] = cur;
      saveState(); updateKPIs();
    });
  });
}

    const newEd = state.edits[rawP.id] ? Object.assign({}, state.edits[rawP.id]) : {};

    document.querySelectorAll('#modal-body [data-fld]').forEach(el => {

      let val = el.value;
      if (val === '') val = null;
      else if (el.type === 'number') val = parseFloat(val) || null;
      const original = rawP[f];
      if (f === '_obs') {
        if (val) newEd._obs = val; else delete newEd._obs;
        return;
      }
      if (val !== original && val != null) {
        if (!(f in newEd) || newEd[f] !== val) {
          meta[f] = { old: original, new: val, ts: Date.now(), by: state.levantador };
          newEd[f] = val;
        }
      } else if (val == null && f in newEd) {

    applyFilter();
    showToast('Datos restaurados');
  });
}

function buildExportData() {
  const today = new Date().toISOString();
  const notesRows = [['proyecto','levantador','fecha','observaciones','ub_validada','visible_calle','caseta','tel_visible','avance_obra','senaletica','contacto_ventas','brochure','forma_pago']];
  Object.entries(state.notes).forEach(([id, n]) => {
    const p = PROJECTS.find(x => x.id === id);
    if (!p) return;
    const c = n.checks || {};
    notesRows.push([p.project, n.by||'', n.ts? new Date(n.ts).toISOString():'', n.observaciones||'', c.ub_validada?'Si':'No', c.visible_calle?'Si':'No', c.caseta?'Si':'No', c.tel_visible?'Si':'No', c.avance_obra?'Si':'No', c.senaletica?'Si':'No', c.contacto_ventas?'Si':'No', c.brochure?'Si':'No', c.forma_pago?'Si':'No']);
  });
  const mystRows = [['proyecto','categoria','pregunta','status','respuesta','fecha']];
  Object.entries(state.mysteryAnswers).forEach(([id, byCat]) => {
    const p = PROJECTS.find(x => x.id === id);
    if (!p) return;
    Object.entries(byCat).forEach(([cat, byQ]) => {
      Object.entries(byQ).forEach(([qi, ans]) => {
        const cat0 = MYSTERY_QUESTIONS.find(c => c.category === cat);
        const qText = cat0 ? cat0.questions[parseInt(qi)] : '';
        mystRows.push([p.project, cat, qText, ans.status||'', ans.answer||'', ans.ts? new Date(ans.ts).toISOString():'']);
      });
    });
  });
  const editsRows = [['proyecto','campo','valor_original','valor_nuevo','levantador','fecha','observacion']];
  Object.entries(state.edits).forEach(([id, ed]) => {
    const p = PROJECTS.find(x => x.id === id);
    if (!p) return;
    const meta = ed._meta || {};
    Object.entries(ed).filter(([k]) => !k.startsWith('_')).forEach(([f, val]) => {
      const m = meta[f] || {};
      editsRows.push([p.project, f, m.old!=null?m.old:p[f]||'', val, m.by||state.levantador, m.ts? new Date(m.ts).toISOString():today, ed._obs||'']);
    });
  });
  const visRows = [['proyecto','levantador','fecha']];
  Object.entries(state.visited).forEach(([id, v]) => {
    const p = PROJECTS.find(x => x.id === id);
    if (!p) return;
    visRows.push([p.project, v.by||'', v.ts? new Date(v.ts).toISOString():'']);
  });
  const baseUpdated = PROJECTS.map(p => Object.assign({}, effectiveProject(p), {
    _visited: state.visited[p.id] || null,
    _notes: state.notes[p.id] || null,
    _mystery: state.mysteryAnswers[p.id] || null,
    _edits_meta: (state.edits[p.id] && state.edits[p.id]._meta) || null,
  }));
  return { notesRows, mystRows, editsRows, visRows, baseUpdated, today };
}

function csvify(rows) {
  return rows.map(r => r.map(c => {
    const s = String(c==null?'':c);
    if (/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
    return s;
  }).join(',')).join('\n');
}

async function exportZIP() {
  const d = buildExportData();
  const zip = new JSZip();
  zip.file('notas_recorrido.csv', csvify(d.notesRows));
  zip.file('mystery_shopper.csv', csvify(d.mystRows));
  zip.file('edits_campo.csv', csvify(d.editsRows));
  zip.file('visitados.csv', csvify(d.visRows));
  zip.file('base_actualizada.json', JSON.stringify(d.baseUpdated, null, 2));
  zip.file('metadata.json', JSON.stringify({ levantador: state.levantador, exportedAt: d.today, totalProjects: PROJECTS.length }, null, 2));
  const blob = await zip.generateAsync({ type: 'blob' });
  triggerDownload(blob, 'esento-cancun-recorrido-' + state.levantador + '-' + d.today.slice(0,10) + '.zip');
  closeModal();
  showToast('ZIP descargado');
}

  triggerDownload(blob, 'esento-cancun-recorrido-' + state.levantador + '-' + d.today.slice(0,10) + '.json');

}

function downloadCSVs() {
  const d = buildExportData();
  triggerDownload(new Blob([csvify(d.notesRows)], {type:'text/csv'}), 'notas-' + d.today.slice(0,10) + '.csv');
  setTimeout(() => triggerDownload(new Blob([csvify(d.mystRows)], {type:'text/csv'}), 'mystery-' + d.today.slice(0,10) + '.csv'), 200);
  setTimeout(() => triggerDownload(new Blob([csvify(d.editsRows)], {type:'text/csv'}), 'edits-' + d.today.slice(0,10) + '.csv'), 400);
  setTimeout(() => triggerDownload(new Blob([csvify(d.visRows)], {type:'text/csv'}), 'visitados-' + d.today.slice(0,10) + '.csv'), 600);
  closeModal();
  showToast('CSVs descargados');
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:200px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 18px;border-radius:8px;z-index:10000;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:opacity .2s;opacity:0';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2000);
}

document.getElementById('fab-loc').addEventListener('click', () => {
